<div class="container mt-4">
  <h2 class="mb-4">♟️ Créer un club</h2>

  @if (successMessage()) {
    <div class="alert alert-success">{{ successMessage() }}</div>
  }

  @if (errorMessage()) {
    <div class="alert alert-danger">{{ errorMessage() }}</div>
  }

  <form [formGroup]="chessClubForm" (ngSubmit)="onSubmit()">

    <div class="mb-3">
      <label class="form-label">Nom du club *</label>
      <input type="text" class="form-control"
             formControlName="nameChessClub"
             placeholder="Ex: Club de Mons">
      @if (chessClubForm.get('nameChessClub')?.invalid && chessClubForm.get('nameChessClub')?.touched) {
        <div class="text-danger">Le nom du club est obligatoire !</div>
      }
    </div>

    <div class="d-flex gap-2">
      <button type="submit"
              class="btn btn-primary"
              [disabled]="chessClubForm.invalid">
        Créer le club
      </button>
      <button type="button"
              class="btn btn-secondary"
              (click)="cancel()">
        Annuler
      </button>
      <a routerLink="/chessclubs/list" class="btn btn-outline-info">
        📋 Voir liste des clubs
      </a>
    </div>

  </form>
</div>
